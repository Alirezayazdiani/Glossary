<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Engineering Economics — Flashcards</title>
<style>
  :root{
    --ink:#10211f; --paper:#f3efe6; --card:#fbf9f3; --rule:#d8d0bf;
    --accent:#c2410c; --accent-soft:#e8d9c6; --teal:#0d4a44;
    --muted:#6f6757; --good:#2f7d59; --good-soft:#dcece1;
    --warn:#b45309; --warn-soft:#f3e4cd;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:radial-gradient(120% 80% at 50% -10%, #fffdf7 0%, var(--paper) 55%);
    color:var(--ink);
    font-family:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;
    -webkit-font-smoothing:antialiased;min-height:100%;
    display:flex;flex-direction:column;align-items:center;padding:26px 18px 52px;
  }
  .wrap{width:100%;max-width:720px}
  header{display:flex;flex-direction:column;gap:3px;margin-bottom:14px}
  .eyebrow{font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    letter-spacing:.18em;text-transform:uppercase;font-size:11px;color:var(--accent)}
  h1{margin:0;font-size:25px;font-weight:600;letter-spacing:-.01em;color:var(--teal)}
  .sub{color:var(--muted);font-size:13.5px}

  /* segmented mode toggle */
  .modes{display:inline-flex;border:1px solid var(--rule);border-radius:10px;
    overflow:hidden;margin:14px 0 12px;background:var(--card)}
  .modes button{border:0;background:transparent;color:var(--muted);
    padding:8px 16px;font:inherit;font-size:13px;cursor:pointer}
  .modes button[aria-pressed="true"]{background:var(--teal);color:#fff}

  .controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
  .search{flex:1 1 190px;min-width:150px;border:1px solid var(--rule);border-radius:10px;
    padding:9px 12px;font:inherit;font-size:14px;background:var(--card);color:var(--ink)}
  .search:focus{outline:2px solid var(--accent);outline-offset:1px;border-color:transparent}
  button.ghost{font:inherit;font-size:13px;border:1px solid var(--rule);background:var(--card);
    color:var(--teal);border-radius:10px;padding:9px 13px;cursor:pointer;
    transition:transform .08s ease,background .15s ease}
  button.ghost:hover{background:#fff}
  button.ghost:active{transform:translateY(1px)}
  button:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

  /* stats + progress */
  .stats{display:flex;align-items:center;gap:14px;margin-bottom:10px;
    font-family:ui-monospace,monospace;font-size:12px;color:var(--muted)}
  .stats b{font-weight:600}
  .stats .g{color:var(--good)} .stats .w{color:var(--warn)}
  .progress{flex:1;height:6px;border-radius:99px;background:var(--accent-soft);
    overflow:hidden;min-width:80px}
  .bar{height:100%;background:linear-gradient(90deg,var(--teal),var(--good));width:0;
    transition:width .3s ease}

  .stage{perspective:1600px}
  .card{position:relative;width:100%;min-height:300px;cursor:pointer;
    transform-style:preserve-3d;transition:transform .5s cubic-bezier(.4,.2,.2,1);border-radius:18px}
  .card.flip{transform:rotateY(180deg)}
  .card.instant{transition:none}
  .face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;
    border:1px solid var(--rule);border-radius:18px;background:var(--card);
    box-shadow:0 1px 0 #fff inset,0 18px 40px -24px rgba(16,33,31,.5);
    padding:36px 30px;display:flex;flex-direction:column;justify-content:center}
  .face .tag{position:absolute;top:16px;left:18px;font-family:ui-monospace,monospace;
    font-size:10px;letter-spacing:.16em;text-transform:uppercase}
  .front .tag{color:var(--accent)} .back .tag{color:var(--teal)}
  .pill{position:absolute;top:14px;right:16px;font-family:ui-monospace,monospace;
    font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--good);
    background:var(--good-soft);border-radius:99px;padding:3px 9px;display:none}
  .card.known .pill{display:inline-block}
  .back{transform:rotateY(180deg);background:linear-gradient(180deg,#fff 0%,#fbf6ec 100%)}
  .term{font-size:27px;line-height:1.2;font-weight:600;color:var(--teal);letter-spacing:-.01em}
  .defn{font-size:18px;line-height:1.5;color:var(--ink)}
  .hint{position:absolute;bottom:15px;left:0;right:0;text-align:center;
    font-family:ui-monospace,monospace;font-size:10.5px;letter-spacing:.12em;
    text-transform:uppercase;color:var(--muted)}

  /* rate row (study) */
  .rate{display:flex;gap:12px;margin-top:16px}
  .rate button{flex:1;font:inherit;font-size:15px;border-radius:12px;padding:14px;
    cursor:pointer;border:1px solid var(--rule);transition:transform .08s ease,filter .15s ease,opacity .15s}
  .rate button:active{transform:translateY(1px)}
  .rate .got{background:var(--good-soft);border-color:#bcd9c8;color:#1e5a3d}
  .rate .rev{background:var(--warn-soft);border-color:#e6cfa6;color:#8a4b06}
  .rate button:hover{filter:brightness(1.03)}
  .rate.locked button{opacity:.4;cursor:not-allowed}
  .rate .k{font-family:ui-monospace,monospace;font-size:11px;opacity:.7;margin-left:6px}

  /* browse nav */
  .nav{display:flex;align-items:center;gap:12px;margin-top:16px;justify-content:center}
  .nav .ghost{min-width:104px}
  .counter{font-family:ui-monospace,monospace;font-size:12px;color:var(--muted);min-width:64px;text-align:center}

  .kbd{font-family:ui-monospace,monospace;font-size:11px;color:var(--muted);
    text-align:center;margin-top:14px}
  .empty{padding:40px;text-align:center;color:var(--muted);
    border:1px dashed var(--rule);border-radius:18px;min-height:300px;
    display:flex;align-items:center;justify-content:center}

  /* summary */
  .summary{min-height:300px;border:1px solid var(--rule);border-radius:18px;
    background:linear-gradient(180deg,#fff,#fbf6ec);padding:34px 30px;
    display:flex;flex-direction:column;justify-content:center;text-align:center}
  .summary h2{margin:0 0 6px;color:var(--teal);font-size:24px}
  .summary p{margin:2px 0;color:var(--muted);font-size:15px}
  .summary .big{font-size:44px;color:var(--good);font-weight:600;margin:6px 0}
  .summary .acts{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:18px}
  .summary .acts button{font:inherit;font-size:14px;border-radius:12px;padding:11px 16px;cursor:pointer;border:1px solid var(--rule)}
  .summary .primary{background:var(--teal);color:#fff;border-color:var(--teal)}
  .summary .tricky{background:var(--warn-soft);color:#8a4b06;border-color:#e6cfa6}
  .summary .ghost2{background:var(--card);color:var(--teal)}

  .hidden{display:none !important}
  @media (prefers-reduced-motion: reduce){.card,.bar{transition:none}}
  @media (max-width:480px){.term{font-size:23px}.defn{font-size:16px}.face{padding:28px 22px}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <span class="eyebrow">ENMGT · Engineering Economics</span>
    <h1>Glossary Flashcards</h1>
    <span class="sub" id="sub"></span>
  </header>

  <div class="modes" role="group" aria-label="Mode">
    <button id="mStudy" aria-pressed="true">Study</button>
    <button id="mBrowse" aria-pressed="false">Browse</button>
  </div>

  <div class="controls">
    <input class="search" id="search" type="search" placeholder="Filter terms or definitions…" aria-label="Filter cards">
    <button class="ghost" id="shuffle">Shuffle</button>
    <button class="ghost" id="restart">Restart</button>
    <button class="ghost" id="resetprog" title="Clear mastered marks">Reset progress</button>
  </div>

  <div class="stats" id="statsRow">
    <span>Mastered <b class="g" id="sKnown">0</b> / <b id="sTotal">0</b></span>
    <span id="sQueueWrap">· In queue <b class="w" id="sQueue">0</b></span>
    <div class="progress"><div class="bar" id="bar"></div></div>
  </div>

  <div class="stage" id="stage">
    <div class="summary hidden" id="summary"></div>
    <div class="empty hidden" id="empty">No terms match your filter.</div>
    <div class="card" id="card" tabindex="0" role="button" aria-label="Flashcard, press space to flip">
      <div class="face front">
        <span class="tag">Term</span><span class="pill">Mastered</span>
        <div class="term" id="front"></div>
        <div class="hint">Click / Space to flip</div>
      </div>
      <div class="face back">
        <span class="tag">Definition</span>
        <div class="defn" id="back"></div>
        <div class="hint" id="backHint">Rate how you did</div>
      </div>
    </div>
  </div>

  <!-- study controls -->
  <div class="rate locked" id="rateRow">
    <button class="rev" id="btnReview">Review again<span class="k">2</span></button>
    <button class="got" id="btnGot">Got it<span class="k">1</span></button>
  </div>

  <!-- browse controls -->
  <div class="nav hidden" id="navRow">
    <button class="ghost" id="prev">← Prev</button>
    <span class="counter" id="counter"></span>
    <button class="ghost" id="next">Next →</button>
  </div>

  <div class="kbd" id="kbd">Space / F flips · 1 = Got it · 2 = Review again</div>
</div>

<script>
const ALL = [{"t": "Absorption Costing", "d": "A cost accounting method that allocates fixed overhead costs to each unit produced in the relevant period."}, {"t": "Accounting", "d": "The act or process of keeping records and financial accounts of all transactions."}, {"t": "Accounts Receivable (AR / A/R)", "d": "Money owed to a company by its debtors. Typically the money due from customers for products shipped or services rendered but not yet paid for."}, {"t": "Accounts Payable (AP / A/P)", "d": "Money a company owes to others, excluding shareholders or owners — e.g. money owed to vendors for parts and services received but not yet paid for."}, {"t": "Accrued", "d": "An amount accumulated over a period of time."}, {"t": "Accrued Interest", "d": "Interest that has accumulated since the principal investment, or since the previous compounding period."}, {"t": "Activity-Based Costing", "d": "A costing method that identifies activities in an organization and assigns the cost of each activity to all products and services according to the actual consumption by each."}, {"t": "Amortization", "d": "The spreading out of payments over a period of time."}, {"t": "Amortization of Loans", "d": "The process of spreading out a loan into a series of (usually fixed) payments over time, as shown in an amortization schedule."}, {"t": "Amortization of Assets", "d": "The allocation of the cost of intangible assets (e.g. patents) over their economic useful life, represented within expenses on the Income Statement."}, {"t": "Allocated Cost", "d": "A cost that has been assigned to a specific cost object such as a product line, department, business unit, or program (e.g. assigning plant overhead to product lines)."}, {"t": "Amortization Schedule", "d": "A schedule that lists, for each payment period: the loan payment, interest paid, principal paid, and remaining balance."}, {"t": "Analysis Period / Planning Horizon / Project Life", "d": "The time period considered for a present worth analysis — usually the time needed to accomplish the task and/or the life of the project."}, {"t": "Annual Cost", "d": "The cost per year of owning and operating an asset over its entire lifespan."}, {"t": "Annuity Due", "d": "Uniform cash flows that occur at the beginning of each period — e.g. lease, rent, insurance, and tuition payments."}, {"t": "Assets", "d": "Property owned by a company that has a quantified value."}, {"t": "Average Cost", "d": "The total cost divided by the number of units produced."}, {"t": "Balance Sheet", "d": "A standard financial report that summarizes all Assets, Liabilities, and Equity of a company as of a given date — a snapshot at a point in time."}, {"t": "Benefits", "d": "Advantages gained as a result of a decision, action, or event — an increase in something positive (cash, morale) or a decrease in something negative (costs, risks)."}, {"t": "Benefit-Cost Ratio", "d": "PW of benefits / PW of costs."}, {"t": "Beta Distribution", "d": "A probability distribution. A common simple form used in economic analysis: mean = (optimistic + 4 × most likely + pessimistic) / 6."}, {"t": "Book Cost", "d": "A cost reflected in the records and statements of a company that does not directly reflect actual cash payments."}, {"t": "Break-Even Point", "d": "The point at which total costs equal total benefits, so profit is zero. May be expressed as a sales dollar amount, a sales volume, or a period of time (e.g. 15,000 units ≈ 9 months of sales)."}, {"t": "Break-Even Analysis", "d": "A form of sensitivity analysis, often presented as a break-even chart."}, {"t": "Capital Recovery Cost", "d": "The equivalent uniform annual cost of the net capital expenditure, including both initial costs and salvage values (if any)."}, {"t": "Capitalized Cost", "d": "The present worth of cost when the analysis has an infinite analysis period."}, {"t": "Cash Disbursement", "d": "Also called cash payments; payments made by a company during a specified period such as a quarter or year."}, {"t": "Cash Flow Diagram", "d": "A visual representation of cash flows in and out over a number of time periods."}, {"t": "Cash Receipts", "d": "Money received by a company during a specified period such as a quarter or year."}, {"t": "Cash Equivalents", "d": "Short-term liquid investments that can readily be converted to cash in a short period without significant risk to their relative value."}, {"t": "Compound Interest", "d": "Interest on a deposit or loan that itself earns interest in later periods."}, {"t": "Contribution Margin", "d": "The amount a unit sale contributes to profit."}, {"t": "Cost", "d": "An outlay, expenditure, or anything given up in order to obtain or accomplish something."}, {"t": "Cost Indexing", "d": "A method of using historical changes in costs to scale cost estimates. Cost at time B = (Cost at time A) × [(Index at time B) / (Index at time A)]."}, {"t": "Per-Unit Model", "d": "A cost-estimating model in which a cost estimate is made for a single unit; total cost = X × (cost per unit)."}, {"t": "Power-Sizing Model", "d": "A cost-estimating model that explicitly accounts for economies of scale by using a power-sizing factor or exponent."}, {"t": "Learning-Curve Cost Estimating", "d": "Based on the assumption that as a task is repeated the operator systematically becomes quicker (and other barriers to peak efficiency reduce over time)."}, {"t": "Cost of Capital", "d": "The internal rate of return needed to make a capital project worthwhile — typically a weighted average cost of capital (WACC), unless financed solely through equity or solely through debt."}, {"t": "Current Assets", "d": "Assets expected to convert to cash within the next 12 months through normal operations (e.g. cash, accounts receivable, inventories)."}, {"t": "Current Cost", "d": "The economic value of resources used or required now, regardless of how they appear in accounting statements."}, {"t": "Current Expense", "d": "An operating cost recognized in the present accounting period, typically tied to activities within the current fiscal year."}, {"t": "Current Liabilities", "d": "Liabilities due within the next 12 months (e.g. accounts payable)."}, {"t": "Current Ratio", "d": "A liquidity ratio measuring ability to pay short-term obligations. Current Ratio = Current Assets / Current Liabilities. ~1.5–3.0 is often healthy; below 1.5 may signal trouble paying liabilities."}, {"t": "Debt-to-Equity Ratio (D/E)", "d": "A measure of financial leverage: the degree to which a company finances operations using debt versus wholly-owned funds. D/E = Total Liabilities / Shareholder Equity."}, {"t": "Decision Tree", "d": "A decision-support tool using a tree-like graph of decisions and their possible consequences, including chance outcomes, resource costs, and utility."}, {"t": "Decision Tree Nodes", "d": "Chance node = a probabilistic event (each outcome has a probability). Decision node = the decision-maker chooses one available path. Outcome node = shows the result for a particular path."}, {"t": "Depletion", "d": "An accrual accounting technique used to allocate the cost of extracting natural resources such as timber, minerals, and oil from the earth."}, {"t": "Depreciation", "d": "A reduction of value over time. In accounting: allocation of a tangible asset's cost to expense periods over its useful life (set by a depreciation schedule). In economic analysis: the decrease in an asset's market value, which may be non-uniform."}, {"t": "Direct Costs", "d": "Costs from activities that can be directly associated with the final product or service (e.g. direct material, direct labor)."}, {"t": "Discounted Cash Flow (DCF)", "d": "The analysis of cash flow that adjusts for the time value of money."}, {"t": "Discount Rate", "d": "The interest rate used in financial analyses to convert future sums to a present value (or vice versa)."}, {"t": "Dollar-Years", "d": "A measure of how long and how much money is tied up — the economic footprint of capital over time. The area under the value-versus-time curve (dollars on the vertical axis, years on the horizontal)."}, {"t": "Economics", "d": "The study of how people and organizations make choices about using limited resources to produce, distribute, and consume goods and services."}, {"t": "Economic Value", "d": "The worth of a resource, action, or outcome based on its expected benefits, alternatives, and opportunity cost — not simply its purchase price or accounting value."}, {"t": "End-of-Year Convention", "d": "Treating cash flows as if they occur at the end of a year."}, {"t": "Engineering Economics", "d": "The application of economic principles and quantitative analysis to evaluate engineering alternatives and support decisions about projects, systems, and investments over time."}, {"t": "Rough Estimate", "d": "Order-of-magnitude, back-of-the-envelope estimate with limited detail or accuracy; used for high-level planning, feasibility, and a project's initial planning phases."}, {"t": "Semi-Detailed Estimate", "d": "A more detailed estimate used for budgeting at a project's conceptual or preliminary design stages."}, {"t": "Detailed Estimate", "d": "An estimate made from detailed quantitative models, blueprints, spec sheets, and vendor quotes; used during detailed design and contract bidding."}, {"t": "Equity", "d": "The difference between the value of an asset and the liabilities associated with it. Shareholder equity = Assets − Liabilities; the amount left for owners if all assets were liquidated and liabilities paid."}, {"t": "Equivalency", "d": "The relative equality between differing cash flows based on the time value of money."}, {"t": "Exact Economic Analysis Methods", "d": "The four exact methods: Present Worth analysis, Annual Cash Flow analysis, Rate of Return analysis, and Benefit-Cost ratio analysis."}, {"t": "Expected Value", "d": "The probability-weighted average of all possible values."}, {"t": "External Costs", "d": "Costs external to the company — hard to estimate and typically not used in pricing or business analysis (e.g. end-of-life disposal, environmental effects, health impacts, social costs)."}, {"t": "Factory Overhead", "d": "Also Manufacturing Overhead or Factory Burden: indirect costs incurred when a product is produced. Allocated to production and included within COGS."}, {"t": "Finance", "d": "The study and management of money over time — how funds are raised, invested, and allocated to create value while managing risk; also how assets are valued and how the cost of capital influences decisions."}, {"t": "Financial Statements", "d": "Standard statements companies report to summarize current status and changes over a period: the Balance Sheet, the Income Statement, and the Statement of Cash Flows (sometimes a fourth — the Statement of Shareholder Equity)."}, {"t": "Fixed Asset", "d": "Tangible assets NOT expected to convert to cash within the next 12 months through normal operations (e.g. buildings, equipment, PP&E)."}, {"t": "Fixed Costs", "d": "Business costs that are fixed regardless of production volume; they must be paid regardless of output. Usually treated as operating expenses (insurance, SG&A, salaries, most utilities), though some — like factory overhead — may sit in COGS."}, {"t": "Fundamental Accounting Equation", "d": "Assets = Liabilities + Equity."}, {"t": "Future Value / Future Worth", "d": "The value of an asset at a specified future date, based on an assumed rate of growth."}, {"t": "Goodwill", "d": "An intangible asset arising when an existing business is purchased above the fair value of its quantifiable assets minus liabilities (e.g. brand name, customer base, patents, trade secrets)."}, {"t": "Graphical Approach", "d": "Using graphs to find, interpret, or represent the results of several alternatives."}, {"t": "Income Statement", "d": "A standard financial report summarizing Income, COGS, Gross Profit, and Operating expenses for a period, resulting in Net Profit or Net Loss. Also called the Profit & Loss (P&L) statement."}, {"t": "Indirect Costs", "d": "Costs from activities that CANNOT be directly associated with the final product or service (e.g. insurance, most utilities, SG&A, R&D)."}, {"t": "Incremental Cost", "d": "The difference in the cost of one alternative compared to the cost of another alternative."}, {"t": "Incremental Rate of Return", "d": "An analysis of financial return where two competing investments require different amounts; applied to the difference between the costs of the two investments."}, {"t": "Intangible Assets", "d": "Non-physical assets with a useful life greater than one year (e.g. trademarks, patents, customer lists, goodwill)."}, {"t": "Intangible Benefits", "d": "Benefits that cannot be quantified and measured in terms of money (e.g. reputation, morale, goodwill)."}, {"t": "Intangible Costs", "d": "Costs difficult or impossible to quantify and/or to allocate accurately to a source (e.g. lower employee morale, customer dissatisfaction, brand damage). May be internal or external."}, {"t": "Internal Costs", "d": "Costs internal to the company that can typically be estimated and measured for pricing or profitability (e.g. materials, parts, labor, equipment, overhead)."}, {"t": "Internal Rate of Return (IRR)", "d": "A measure of an alternative's profitability — the discount rate at which NPV = 0 (PW = 0 = EUAW). On a loan, the interest rate on the unpaid balance; on an investment, the rate earned on the un-recovered investment."}, {"t": "Interest Payment", "d": "A payment determined by the interest rate and the remaining principal owed. Loan payments often include both a principal payment and an interest payment."}, {"t": "Interest Rate", "d": "The charge made for the loan of financial capital, expressed as a proportion of the loan."}, {"t": "Nominal Interest Rate", "d": "The annual interest rate without considering the effect of any compounding."}, {"t": "Effective Interest Rate", "d": "The annual interest rate taking into account the effect of any compounding during the year."}, {"t": "Annual Percentage Rate (APR)", "d": "The rate of interest that equates the present discounted value of funds received to the present discounted value of payments made."}, {"t": "Annual Percentage Yield (APY)", "d": "The effective interest rate earned on savings accounts, certificates of deposit, and bonds."}, {"t": "Inventory", "d": "Merchandise, raw materials, and work in process a company has on hand that is available for sale or will be used to produce items for sale."}, {"t": "Inventory Turnover (Inventory Turns)", "d": "A ratio of how effectively a company turns money tied up in inventory into cash: COGS / Average Total Inventory (sometimes Total Sales Revenue / Average Total Inventory). How many times inventory is sold and replaced per period."}, {"t": "JIT (Just-In-Time)", "d": "An inventory management strategy that closely aligns delivery of inventory with the production schedule to reduce inventory levels and increase efficiency."}, {"t": "KPI (Key Performance Indicator)", "d": "A measurable variable indicating how effectively a company, department, or team manages, maintains, or improves a metric aligned with business objectives."}, {"t": "Liquidity", "d": "A measure of how quickly an asset can be converted to cash (or another asset) without risk of loss to its intrinsic value. Cash is the most liquid; a building or rare antique is highly illiquid."}, {"t": "Liabilities", "d": "What a company owes to others besides its owners — financial, legal, or material debts arising during business that the company is obligated to fulfill."}, {"t": "Life-Cycle Cost", "d": "All costs over the entire life of a product, structure, system, or service."}, {"t": "Marginal Cost", "d": "The cost associated with producing one more (the next) unit. A marginal cost is a form of incremental cost, but incremental cost applies to a much wider variety of comparisons — the terms are not broadly equivalent."}, {"t": "MARR (Minimum Acceptable Rate of Return)", "d": "The minimum rate of return on a project a company is willing to accept before starting it, given its risk and the opportunity cost of forgoing other projects."}, {"t": "Monte Carlo Simulation", "d": "A technique to understand the impact of risk and uncertainty in financial, project, cost, and other forecasting models by visualizing most or all potential outcomes."}, {"t": "Net Present Worth (NPW)", "d": "PW of benefits − PW of costs. Same as Present Worth (PW) or Present Value (PV); the 'Net' prefix simply reminds that both benefits and costs are included."}, {"t": "Non-Recurring Costs", "d": "Extraordinary and/or one-time expenses not expected to recur (e.g. certain legal fees, acquisition costs, purchasing a new building, severance packages)."}, {"t": "Opportunity Cost", "d": "The benefits foregone when one alternative is chosen over another — the loss of potential gains from the option not selected."}, {"t": "Owner's Equity", "d": "The portion of a company's assets that owners have a claim to. Equity is one of two sources of funds for assets, the other being liabilities (debt)."}, {"t": "Overhead", "d": "Ongoing business expenses not directly attributed to producing a product or service."}, {"t": "Payback Period", "d": "The time required for a project's gains or benefits to equal its cost; usually measured in months."}, {"t": "P&L (Profit and Loss Statement)", "d": "Another name for the Income Statement."}, {"t": "Prepaid (Prepaid Expense)", "d": "An expense paid for an asset in one period for use in a future period (e.g. prepaid leases, down payments, insurance). Shown as an asset on the balance sheet; the recipient shows it as unearned revenue (a liability)."}, {"t": "Present Value", "d": "The current value of a future sum of money or stream of cash flows, given a specified rate of return."}, {"t": "Present Worth", "d": "The value of an asset in today's dollars. For this course PW, NPW, PV (P), and NPV are equivalent — though the Excel functions PV and NPV are notably different."}, {"t": "Present Worth Analysis", "d": "Comparing alternatives stated in terms of equivalent present worth."}, {"t": "Principal Payment", "d": "A payment toward the amount of principal owed. Loan payments often include both a principal payment and an interest payment."}, {"t": "Probability", "d": "A measure quantifying the likelihood that an event will occur, from 0 to 1 (0% to 100%)."}, {"t": "Probability Distribution", "d": "A function describing the likelihood of obtaining the possible values that a random variable can assume."}, {"t": "Profit", "d": "The net effect of all benefits minus all costs. Positive is a profit; negative is a loss."}, {"t": "Profitability", "d": "A relative measure of a company's ability to produce a financial gain in relation to the size of the business."}, {"t": "Profit Margin", "d": "A ratio reflecting profitability: Profit Margin = (Net Income / Total Revenue) × 100."}, {"t": "PY (Prior Year)", "d": "An abbreviation used in income statements and financial spreadsheets to indicate values from the previous year."}, {"t": "Quick Assets", "d": "The highly liquid portion of current assets that are cash or quickly convertible to cash without measurable loss (cash, cash equivalents, marketable securities, current AR). = Current Assets − inventory − prepaid expenses − other not-quickly-convertible items."}, {"t": "Quick Ratio", "d": "The ratio of Quick Assets to Current Liabilities: Quick Ratio = Quick Assets / Current Liabilities."}, {"t": "Range of Estimates", "d": "The difference between the lowest and the highest values."}, {"t": "Recurring Costs", "d": "Typical expenses that are ongoing and regular during normal business operations."}, {"t": "Replacement Value", "d": "The amount an entity would have to pay to replace an asset at a given time."}, {"t": "Retained Earnings", "d": "The cumulative profit a company has earned to date, minus any dividends or distributions paid to investors."}, {"t": "Risk", "d": "A form of uncertainty: the actual outcome is unknown, but realistic probabilities can be assigned to each possible outcome."}, {"t": "Salvage Value", "d": "The value a company expects to receive for a capital asset at the end of its useful life."}, {"t": "Sensitivity Analysis", "d": "Analysis of how predictions change with variations in inputs and assumptions — often used to find how much an input can change before a different alternative is preferred."}, {"t": "SG&A", "d": "Sales, General & Administrative — a category of overhead operating expenses on the income statement covering non-production costs (sales and marketing, salaries, general overhead)."}, {"t": "Solvency", "d": "A measure of a company's ability to pay off its long-term debts and financial obligations, including associated interest."}, {"t": "Statement of Cash Flows", "d": "A standard financial report summarizing cash (and cash equivalents) flowing in and out of a company across a given period."}, {"t": "Sunk Costs", "d": "A cost that has already occurred and cannot be recovered. Sunk costs should not be considered during economic analysis."}, {"t": "Tangible Assets", "d": "An asset with a quantifiable, finite monetary value — typically physical in form."}, {"t": "Tangible Benefits", "d": "Benefits that can be quantified and measured, typically in money (income, profit, savings)."}, {"t": "Terminal Value", "d": "The value a company expects to receive for a capital asset at the end of its use by the company, but before the end of its useful life."}, {"t": "Time Value of Money", "d": "The value of money adjusted for differences in time, based on an assumed interest rate. Typically a present sum is worth more than the same sum at a future date."}, {"t": "Transaction", "d": "An event involving two parties and the exchange of money (or a promise of money), typically for a product or service."}, {"t": "Turnover", "d": "Can mean: the total sales revenue for a given period (usually a year); the rate at which employees leave and are replaced; or inventory turns (see Inventory Turnover)."}, {"t": "Unearned Revenue", "d": "A liability arising from money received from customers for work not yet performed or a product not yet delivered."}, {"t": "Variable Costs", "d": "Business costs that vary depending on the number of units produced."}, {"t": "Weighted Average Cost of Capital (WACC)", "d": "A company's cost of capital weighting debt and equity proportionately: WACC = (E/V)×Re + (D/V)×Rd×(1−Tc), where E=equity, D=debt, V=E+D, Re=cost of equity, Rd=cost of debt, Tc=tax rate."}, {"t": "Working Capital", "d": "Current Assets − Current Liabilities. The capital not tied up in land, buildings, or fixed equipment and not committed to current liabilities."}, {"t": "YOY (Year-Over-Year)", "d": "A comparison to the previous year. As a value: YOY = current-year value − prior-year value. As a percent: YOY% = YOY value / prior-year value."}];
const STORE_KEY = "enmgt_econ_mastered_v1";

const $ = id => document.getElementById(id);
const card = $("card");

/* ---- persistence (guarded; safe if storage is blocked in an iframe) ---- */
function loadKnown(){ try{ return new Set(JSON.parse(localStorage.getItem(STORE_KEY)||"[]")); }catch(e){ return new Set(); } }
function saveKnown(){ try{ localStorage.setItem(STORE_KEY, JSON.stringify([...known])); }catch(e){} }

let known = loadKnown();      // Set of mastered terms (persists across sessions)
let mode = "study";           // "study" | "browse"
let queue = [];               // study queue (card objects), current = queue[0]
let pool = ALL.slice();       // filtered universe
let struggled = new Set();    // terms marked "review" at least once this session
let flipped = false;
let bi = 0;                   // browse index

/* ---------------- helpers ---------------- */
function shuffle(a){ for(let k=a.length-1;k>0;k--){const j=Math.floor(Math.random()*(k+1));[a[k],a[j]]=[a[j],a[k]];} return a; }
function setFace(c){
  card.classList.add("instant");
  flipped=false; card.classList.remove("flip");
  card.classList.toggle("known", known.has(c.t));
  $("front").textContent=c.t; $("back").textContent=c.d;
  void card.offsetWidth;                       // reflow so the reset isn't animated
  requestAnimationFrame(()=>card.classList.remove("instant"));
}
function flip(){
  flipped=!flipped; card.classList.toggle("flip",flipped);
  if(mode==="study") $("rateRow").classList.toggle("locked", !flipped);
}
function updateStats(){
  $("sKnown").textContent = [...known].filter(t=>pool.some(c=>c.t===t)).length;
  $("sTotal").textContent = pool.length;
  $("bar").style.width = pool.length ? (($("sKnown").textContent/pool.length)*100)+"%" : "0%";
  if(mode==="study"){ $("sQueueWrap").classList.remove("hidden"); $("sQueue").textContent=queue.length; }
  else $("sQueueWrap").classList.add("hidden");
}

/* ---------------- study mode ---------------- */
function startSession(cards){
  struggled = new Set();
  queue = shuffle(cards.slice());
  $("summary").classList.add("hidden");
  $("empty").classList.toggle("hidden", cards.length>0);
  card.classList.toggle("hidden", cards.length===0);
  if(cards.length) present(); else updateStats();
}
function present(){
  if(queue.length===0){ return summary(); }
  card.classList.remove("hidden"); $("summary").classList.add("hidden"); $("empty").classList.add("hidden");
  setFace(queue[0]);
  $("rateRow").classList.add("locked");
  updateStats();
}
function rate(gotIt){
  if(!flipped || queue.length===0) return;      // must see the answer first
  const c = queue.shift();
  if(gotIt){ known.add(c.t); saveKnown(); }
  else{ struggled.add(c.t); queue.splice(Math.min(queue.length,4),0,c); } // requeue a few cards later
  present();
}
function summary(){
  card.classList.add("hidden"); $("empty").classList.add("hidden");
  const s=$("summary"); s.classList.remove("hidden");
  const total=pool.length, tricky=[...struggled];
  s.innerHTML =
    '<h2>Session complete</h2>'+
    '<div class="big">'+known2poolCount()+' / '+total+'</div>'+
    '<p>terms mastered in this set.</p>'+
    (tricky.length? '<p>'+tricky.length+' term'+(tricky.length>1?'s':'')+' needed a repeat before you got '+(tricky.length>1?'them':'it')+'.</p>':'<p>No repeats needed — clean run.</p>')+
    '<div class="acts">'+
      (tricky.length? '<button class="tricky" id="doTricky">Study the '+tricky.length+' tricky one'+(tricky.length>1?'s':'')+'</button>':'')+
      '<button class="primary" id="doAgain">Study this set again</button>'+
      '<button class="ghost2" id="doAll">Reset & study all</button>'+
    '</div>';
  updateStats();
  if($("doTricky")) $("doTricky").onclick=()=>startSession(ALL.filter(c=>struggled.has(c.t)));
  $("doAgain").onclick=()=>startSession(pool);
  $("doAll").onclick=()=>{ known=new Set(); saveKnown(); startSession(pool); };
}
function known2poolCount(){ return [...known].filter(t=>pool.some(c=>c.t===t)).length; }

/* ---------------- browse mode ---------------- */
function browseRender(){
  if(pool.length===0){ card.classList.add("hidden"); $("empty").classList.remove("hidden"); $("counter").textContent="0 / 0"; return; }
  card.classList.remove("hidden"); $("empty").classList.add("hidden"); $("summary").classList.add("hidden");
  bi=(bi+pool.length)%pool.length;
  setFace(pool[bi]);
  $("counter").textContent=(bi+1)+" / "+pool.length;
  updateStats();
}

/* ---------------- filtering + mode switch ---------------- */
function applyFilter(q){
  q=(q||"").trim().toLowerCase();
  pool = q ? ALL.filter(c=>(c.t+" "+c.d).toLowerCase().includes(q)) : ALL.slice();
  bi=0;
  if(mode==="study") startSession(pool.filter(c=>!known.has(c.t)).length?pool.filter(c=>!known.has(c.t)):pool);
  else browseRender();
}
function setMode(m){
  mode=m;
  $("mStudy").setAttribute("aria-pressed", m==="study");
  $("mBrowse").setAttribute("aria-pressed", m==="browse");
  $("rateRow").classList.toggle("hidden", m!=="study");
  $("navRow").classList.toggle("hidden", m==="study");
  $("kbd").textContent = m==="study" ? "Space / F flips · 1 = Got it · 2 = Review again"
                                     : "← → browse · Space / F flips";
  if(m==="study"){
    const todo = pool.filter(c=>!known.has(c.t));
    startSession(todo.length?todo:pool);
  } else browseRender();
}

/* ---------------- wiring ---------------- */
card.addEventListener("click", flip);
$("btnGot").onclick=()=>rate(true);
$("btnReview").onclick=()=>rate(false);
$("mStudy").onclick=()=>setMode("study");
$("mBrowse").onclick=()=>setMode("browse");
$("prev").onclick=()=>{bi--;browseRender();};
$("next").onclick=()=>{bi++;browseRender();};
$("shuffle").onclick=()=>{ if(mode==="study"){shuffle(queue);present();} else {shuffle(pool);bi=0;browseRender();} };
$("restart").onclick=()=>{ if(mode==="study"){const todo=pool.filter(c=>!known.has(c.t));startSession(todo.length?todo:pool);} else {bi=0;browseRender();} };
$("resetprog").onclick=()=>{ known=new Set(); saveKnown(); setMode(mode); };
$("search").addEventListener("input", e=>applyFilter(e.target.value));

document.addEventListener("keydown", e=>{
  if(e.target.tagName==="INPUT") return;
  const k=e.key.toLowerCase();
  if(k===" "||k==="f"){flip();e.preventDefault();}
  else if(mode==="study"){
    if(k==="1"||k==="j"){rate(true);e.preventDefault();}
    else if(k==="2"||k==="k"){rate(false);e.preventDefault();}
  } else {
    if(e.key==="ArrowRight"){bi++;browseRender();e.preventDefault();}
    else if(e.key==="ArrowLeft"){bi--;browseRender();e.preventDefault();}
  }
});

$("sub").textContent = ALL.length + " terms · flip, then rate yourself — missed cards come back until you clear them";
setMode("study");
</script>
</body>
</html>
